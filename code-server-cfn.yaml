AWSTemplateFormatVersion: "2010-09-09"
Description: EC2 instance running code-server on port 8080

Parameters:
  UserName:
    Type: String
  InstanceType:
    Type: String
    Default: t3.medium
  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
  CodeServerPassword:
    Type: String

Resources:
  CodeServerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH and code-server access
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 0.0.0.0/0

  CodeServerInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref AmiId
      SecurityGroupIds:
        - !Ref CodeServerSecurityGroup
      IamInstanceProfile: EC2TerraformProfile
      UserData:
        Fn::Base64:
          Fn::Sub: |
            #!/bin/bash
            set -euxo pipefail

            exec > >(tee /var/log/user-data.log | logger -t user-data -s 2>/dev/console) 2>&1

            export HOME=/root

            CODE_SERVER_USER=ec2-user
            CODE_SERVER_PASSWORD=${CodeServerPassword}
            CODE_SERVER_PORT=8080
            PROJECT_DIR=/home/ec2-user/terraform
            SERVICE_DIR=/etc/systemd/system/code-server@$CODE_SERVER_USER.service.d

            dnf update -y

            curl -fsSL https://code-server.dev/install.sh -o /tmp/code-server-install.sh
            chmod +x /tmp/code-server-install.sh
            /bin/sh /tmp/code-server-install.sh

            install -d -m 700 -o $CODE_SERVER_USER -g $CODE_SERVER_USER /home/$CODE_SERVER_USER/.config/code-server

            printf 'bind-addr: 0.0.0.0:%s\nauth: password\npassword: %s\ncert: false\n' \
              $CODE_SERVER_PORT $CODE_SERVER_PASSWORD \
              > /home/$CODE_SERVER_USER/.config/code-server/config.yaml

            chown $CODE_SERVER_USER:$CODE_SERVER_USER /home/$CODE_SERVER_USER/.config/code-server/config.yaml
            chmod 600 /home/$CODE_SERVER_USER/.config/code-server/config.yaml

            mkdir -p /home/$CODE_SERVER_USER/.local/share/code-server/User

            cat > /home/$CODE_SERVER_USER/.local/share/code-server/User/settings.json << 'SETTINGS'
            {
              "files.exclude": {
                "**/.git": true,
                "**/.github": true,
                "**/.terraform": true,
                "**/.cache": true,
                "**/.local": true,
                "**/.ssh": true,
                "**/.config": true,
                "**/.bash_logout": true,
                "**/.bash_profile": true,
                "**/.bashrc": true
              }
            }
            SETTINGS

            chown $CODE_SERVER_USER:$CODE_SERVER_USER /home/$CODE_SERVER_USER/.local/share/code-server/User/settings.json
            chmod 600 /home/$CODE_SERVER_USER/.local/share/code-server/User/settings.json

            systemctl enable --now code-server@$CODE_SERVER_USER

            ss -ltnp || true
            curl -I http://127.0.0.1:8080 || true

            dnf install git -y

            install -d -m 755 -o $CODE_SERVER_USER -g $CODE_SERVER_USER /home/$CODE_SERVER_USER/.local
            install -d -m 755 -o $CODE_SERVER_USER -g $CODE_SERVER_USER /home/$CODE_SERVER_USER/.local/share
            install -d -m 755 -o $CODE_SERVER_USER -g $CODE_SERVER_USER /home/$CODE_SERVER_USER/.local/share/code-server
            sudo -u $CODE_SERVER_USER code-server --install-extension amazonwebservices.aws-toolkit-vscode
            sudo -u $CODE_SERVER_USER code-server --install-extension hashicorp.terraform

            mkdir -p $SERVICE_DIR
            systemctl daemon-reload
            systemctl restart code-server@$CODE_SERVER_USER

      Tags:
        - Key: Name
          Value: !Sub "${UserName}-Code-Server"

  CodeServerDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        PriceClass: PriceClass_100
        Origins:
          - Id: CodeServerOrigin
            DomainName: !GetAtt CodeServerInstance.PublicDnsName
            CustomOriginConfig:
              HTTPPort: 8080
              OriginProtocolPolicy: http-only
        DefaultCacheBehavior:
          TargetOriginId: CodeServerOrigin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3
          AllowedMethods: [DELETE, GET, HEAD, OPTIONS, PATCH, POST, PUT]
          CachedMethods: [GET, HEAD]

Outputs:
  CloudFrontURL:
    Value: !Sub "https://${CodeServerDistribution.DomainName}"
    Description: CloudFront HTTPS URL for code-server